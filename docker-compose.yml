version: '3.3'
services:
  app:
    image: dockware/dev:latest
#    build:
#      context: .
#      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
      - "3306:3306"
      - "22:22"
      - "8888:8888"
      - "9999:9999"
      - "443:443"
      - "1000:1000"
    volumes:
      - "./:/var/www/package-source/MltisafeMultiSafepay/"
    environment:
      # default = latest PHP, optional = specific version
      # default = 0, recommended to be OFF for frontend devs
      - XDEBUG_ENABLED=1
      - SHOP_DOMAIN=${APP_SUBDOMAIN}.${EXPOSE_HOST}:1000
  expose:
    depends_on:
      - app
    build: https://github.com/beyondcode/expose.git
    entrypoint: ["/bin/sh", "-c" , "/src/expose token ${EXPOSE_TOKEN} && sed -i -E \"s/'dns'\\s?=>\\s?'.*'/'dns' => true/g\" /root/.expose/config.php  && /src/expose share app --server-host=${EXPOSE_HOST} --subdomain=${APP_SUBDOMAIN}"]
    ports:
      - 4040:4040
